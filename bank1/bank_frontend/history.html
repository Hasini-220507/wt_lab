<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transaction History  Mini Banking</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="history">
  <div class="app">
    <header class="app-header">
      <div>
        <h1>Mini Banking</h1>
        <p>Welcome, <span id="headerUserName">User</span></p>
      </div>
      <nav class="nav-main">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="deposit.html" class="nav-link">Deposit</a>
        <a href="withdraw.html" class="nav-link">Withdraw</a>
        <a href="transfer.html" class="nav-link">Transfer</a>
        <a href="history.html" class="nav-link active">History</a>
        <button type="button" id="logoutBtn" class="btn secondary">Logout</button>
      </nav>
    </header>

    <main class="app-main">
      <section class="page-content">
        <div class="card">
          <h2>Transaction History</h2>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Date &amp; Time</th>
                  <th>Type</th>
                  <th>Amount</th>
                  <th>Balance After</th>
                  <th>Note</th>
                </tr>
              </thead>
              <tbody id="historyBody"></tbody>
            </table>
          </div>
        </div>
      </section>

      <footer class="app-footer">
        <span>Mini Banking &copy; 2026</span>
      </footer>
    </main>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
