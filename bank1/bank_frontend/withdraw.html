<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Withdraw  Mini Banking</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="withdraw">
  <div class="app">
    <header class="app-header">
      <div>
        <h1>Mini Banking</h1>
        <p>Welcome, <span id="headerUserName">User</span></p>
      </div>
      <nav class="nav-main">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="deposit.html" class="nav-link">Deposit</a>
        <a href="withdraw.html" class="nav-link active">Withdraw</a>
        <a href="transfer.html" class="nav-link">Transfer</a>
        <a href="history.html" class="nav-link">History</a>
        <button type="button" id="logoutBtn" class="btn secondary">Logout</button>
      </nav>
    </header>

    <main class="app-main">
      <section class="page-content">
        <div class="card">
          <h2>Withdraw</h2>
          <form id="withdrawForm" autocomplete="off">
            <div class="field-group">
              <label for="withdrawAmount">Amount (₹)</label>
              <input type="number" id="withdrawAmount" placeholder="Enter amount" step="0.01" min="0.01" required />
            </div>
            <div class="field-group">
              <label for="withdrawNote">Note (optional)</label>
              <input type="text" id="withdrawNote" placeholder="e.g. Groceries" maxlength="40" />
            </div>
            <button type="submit" class="btn primary">Withdraw</button>
          </form>
          <p id="withdrawMessage" class="message"></p>
        </div>
      </section>

      <footer class="app-footer">
        <span>Mini Banking &copy; 2026</span>
      </footer>
    </main>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
